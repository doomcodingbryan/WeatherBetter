name: Refresh backtest calibration

on:
  schedule:
    # 1st of each month at 07:00 UTC — after overnight Kalshi finalizations settle
    - cron: '0 7 1 * *'
  workflow_dispatch:
    inputs:
      end_date:
        description: 'Override END_DATE (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the committed backtest.db so the run is incremental (not a full rebuild).
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backtest pipeline
        run: python3 scripts/build-backtest-db.py
        env:
          PYTHONUNBUFFERED: '1'
          END_DATE: ${{ github.event.inputs.end_date }}

      - name: Verify calibration output
        run: python3 scripts/verify-calibration.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calibration-data.json data/backtest.db
          if git diff --staged --quiet; then
            echo "No new calibration data."
          else
            MONTH=$(date -u +%Y-%m)
            git commit -m "chore: refresh calibration data ${MONTH}"
            git push
          fi
